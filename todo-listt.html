<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>

  <body>
    <p>TODO WEB APP</p>
    <div class="inputBox">
      <input type="text" class="enterTask" />
      <input type="date" class="dateInp" name="" id="" />
      <button class="addBtn">Add Task</button>
    </div>
    <div class="Tasks"></div>

    <script>
      document.querySelector(".addBtn").addEventListener("click", () => {
        AddTask();
      });

      document.body.addEventListener("keydown", (event) => {
        if (event.key == "Enter") {
          AddTask();
        }
        else if (event.key=="d"){
            document.querySelector('.dateInp').showPicker()
        }
      });
      let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
      renderTasks();
      function AddTask() {
        name = document.querySelector(".enterTask").value;
        date = document.querySelector(".dateInp").value;
        tasks.push({ name, date });
        saveTasks();
        renderTasks();
      }
      function renderTasks() {
        document.querySelector(".Tasks").innerHTML = "";
        tasks.forEach((e, i) => {
          document.querySelector(".Tasks").innerHTML += `<div class="task">
            <p class="name">${e.name}</p>
            <p class="date">${e.date}</p>
            <button onclick="tasks.splice(${i}, 1);renderTasks();
            saveTasks();" class="">Delete</button>
        </div>
        `;
        });
      }
      function saveTasks() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
      }
    </script>
  </body>
</html>
